\<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>overexposed</title>
<link rel="icon" href="favicon.png" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=Chivo:wght@700;900&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Chivo', sans-serif;
  background:#fff;
  color:#000;
  text-align:center;
  overflow-x:hidden;
  user-select:none;
  text-transform: lowercase;
  -webkit-font-smoothing: none;
}

/* pixel text */
h1, h2, p, .file {
  text-shadow:
    1px 0 #000,
    0 1px #000,
    1px 1px #000;
}

/* hero */
.hero {
  padding:60px 20px;
  display:flex;
  flex-direction:column;
  align-items:center;
}

.hero img {
  width:180px;
  max-width:70%;
  border-radius:8px;
  box-shadow:0 0 20px rgba(0,0,0,0.2);
}

.hero h1 {
  margin:25px 0 10px;
  font-size:2.8em;
  font-weight:900;
}

.hero p {
  font-size:1em;
  max-width:300px;
}

/* files area */
.files-container {
  position:relative;
  width:100%;
  height:500px;
  margin-top:40px;
}

/* folders */
.file {
  width:130px;
  padding:15px;
  background:#000;
  color:#fff;
  position:absolute;
  cursor:grab;
  font-weight:700;
  font-size:0.9em;
  box-shadow:3px 3px 0 #000;
  transition:transform 0.15s;
}

.file:active {
  cursor:grabbing;
  transform:scale(1.05);
  z-index:999;
}

/* games */
.memory-game, .car-game {
  margin:60px auto;
  max-width:90%;
  padding:20px;
  border:1px solid #000;
  background:#fff;
}

.memory-grid {
  display:grid;
  grid-template-columns:repeat(3, 1fr);
  gap:10px;
  margin-top:15px;
}

.memory-square {
  height:70px;
  background:#eee;
  border:1px solid #000;
}

.memory-square.active {
  background:#000;
}

canvas {
  background:#eee;
  border:1px solid #000;
  max-width:100%;
}

/* mobile adjustments */
@media (max-width:768px) {
  .files-container {
    height:400px;
  }

  .file {
    width:110px;
    font-size:0.8em;
  }

  .hero h1 {
    font-size:2.2em;
  }
}

footer {
  margin:60px 0 20px;
  font-size:0.8em;
  opacity:0.6;
}
</style>
</head>

<body>

<div class="hero">
  <img src="cover.jpg" alt="overexposed cover">
  <h1>overexposed</h1>
  <p>experience it. catch the moments.</p>
</div>

<div class="files-container">
  <div class="file" id="music-file" style="top:40px; left:30px;">music</div>
  <div class="file" id="memory-file" style="top:150px; left:60%;">memory game</div>
  <div class="file" id="car-file" style="top:80px; left:35%;">car challenge</div>
</div>

<div class="memory-game" id="memory-section">
  <h2>strobe memory game</h2>
  <p>flashing lights — viewer discretion advised.</p>
  <div class="memory-grid">
    <div class="memory-square"></div>
    <div class="memory-square"></div>
    <div class="memory-square"></div>
    <div class="memory-square"></div>
    <div class="memory-square"></div>
    <div class="memory-square"></div>
    <div class="memory-square"></div>
    <div class="memory-square"></div>
    <div class="memory-square"></div>
  </div>
  <p id="memory-message">repeat the sequence</p>
</div>

<div class="car-game" id="car-section">
  <h2>8-bit car challenge</h2>
  <canvas id="carCanvas" width="300" height="400"></canvas>
  <p>use arrow keys</p>
</div>

<footer>
  © 2026 snowchild
</footer>

<script>
/* DRAG SUPPORT (mouse + touch) */
const files = document.querySelectorAll('.file');

files.forEach(file => {

  let offsetX = 0, offsetY = 0, dragging = false;

  const startDrag = (clientX, clientY) => {
    const rect = file.getBoundingClientRect();
    offsetX = clientX - rect.left;
    offsetY = clientY - rect.top;
    dragging = true;
    file.style.zIndex = 1000;
  };

  const moveDrag = (clientX, clientY) => {
    if (!dragging) return;
    file.style.left = (clientX - offsetX) + "px";
    file.style.top = (clientY - offsetY) + "px";
  };

  const endDrag = () => {
    dragging = false;
    file.style.zIndex = 1;
  };

  file.addEventListener("mousedown", e => startDrag(e.clientX, e.clientY));
  document.addEventListener("mousemove", e => moveDrag(e.clientX, e.clientY));
  document.addEventListener("mouseup", endDrag);

  file.addEventListener("touchstart", e => {
    const touch = e.touches[0];
    startDrag(touch.clientX, touch.clientY);
  });

  document.addEventListener("touchmove", e => {
    const touch = e.touches[0];
    moveDrag(touch.clientX, touch.clientY);
  });

  document.addEventListener("touchend", endDrag);
});

/* whole music folder clickable */
document.getElementById("music-file").addEventListener("click", () => {
  window.open("https://linktr.ee/vegemiteloverr", "_blank");
});

/* scroll links */
document.getElementById("memory-file").onclick = () => {
  document.getElementById("memory-section").scrollIntoView({behavior:"smooth"});
};

document.getElementById("car-file").onclick = () => {
  document.getElementById("car-section").scrollIntoView({behavior:"smooth"});
};

/* memory game */
const squares = document.querySelectorAll('.memory-square');
let sequence = [], player = [], level = 1;
const message = document.getElementById("memory-message");

function flash() {
  player = [];
  message.textContent = "level " + level;
  let i = 0;
  const interval = setInterval(() => {
    squares.forEach(s => s.classList.remove("active"));
    if (i < sequence.length) {
      squares[sequence[i]].classList.add("active");
      i++;
    } else {
      clearInterval(interval);
      message.textContent = "your turn";
    }
  }, 500);
}

function nextLevel() {
  sequence.push(Math.floor(Math.random() * 9));
  flash();
  level++;
}

squares.forEach((sq, i) => {
  sq.onclick = () => {
    player.push(i);
    if (player[player.length - 1] !== sequence[player.length - 1]) {
      message.textContent = "wrong";
      sequence = [];
      level = 1;
      setTimeout(nextLevel, 1000);
      return;
    }
    if (player.length === sequence.length) {
      setTimeout(nextLevel, 800);
    }
  };
});

nextLevel();

/* car game */
const canvas = document.getElementById("carCanvas");
const ctx = canvas.getContext("2d");
let carX = 130, obstacles = [], score = 0;
let left = false, right = false;

document.addEventListener("keydown", e => {
  if(e.key==="ArrowLeft") left=true;
  if(e.key==="ArrowRight") right=true;
});
document.addEventListener("keyup", e => {
  if(e.key==="ArrowLeft") left=false;
  if(e.key==="ArrowRight") right=false;
});

function loop(){
  ctx.clearRect(0,0,300,400);
  if(left && carX>0) carX-=5;
  if(right && carX<260) carX+=5;

  ctx.fillStyle="#000";
  ctx.fillRect(carX,350,40,40);

  if(Math.random()<0.02){
    obstacles.push({x:Math.random()*260,y:0});
  }

  obstacles.forEach(o=>{
    o.y+=4;
    ctx.fillRect(o.x,o.y,40,20);
  });

  obstacles=obstacles.filter(o=>o.y<400);

  ctx.fillText("score "+score,10,20);
  score++;
  requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
