<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>overexposed</title>
<link href="https://fonts.googleapis.com/css2?family=Chivo:wght@700;900&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Chivo',sans-serif;
  background:#fff;
  color:#000;
  text-align:center;
  text-transform:lowercase;
  overflow-x:hidden;
  perspective:1200px;
}

.background-layer{
  position:fixed;
  inset:0;
  background:linear-gradient(180deg,#fff 0%,#f3f3f3 100%);
  z-index:-1;
  transform:translateZ(-200px) scale(1.3);
}

#loading-screen{
  position:fixed;
  inset:0;
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  z-index:9999;
  animation:flicker .15s infinite;
}

@keyframes flicker{
  0%{opacity:1;}
  50%{opacity:.92;}
  100%{opacity:1;}
}

.loading-text{font-weight:900;}

#site{display:none;}

.hero{
  padding:60px 20px;
  transform:translateZ(40px);
  transition:transform 0.2s ease;
}

.volume-note{
  font-size:.8em;
  opacity:.6;
  margin-top:10px;
}

.files-container{
  position:relative;
  width:100%;
  height:520px;
  margin-top:40px;
  perspective:1200px;
  transform-style:preserve-3d;
}

.file{
  width:160px;
  padding:15px;
  background:#000;
  color:#fff;
  position:absolute;
  cursor:grab;
  font-weight:700;
  font-size:.9em;
  box-shadow:3px 3px 0 #000;
  touch-action:none;
  transform-style:preserve-3d;
  transition:transform 0.2s ease, box-shadow 0.2s ease;
}

.file:hover{
  transform:translateZ(50px) scale(1.03);
  box-shadow:8px 8px 0 #000;
}

.section{
  display:none;
  margin:60px auto;
  max-width:95%;
  padding:25px;
  border:1px solid #000;
  background:#fff;
}

.game{
  margin:15px 0;
  padding:12px;
  border:1px solid #000;
  cursor:pointer;
}

footer{
  margin:60px 0 20px;
  font-size:.8em;
  opacity:.6;
}
</style>
</head>

<body>

<audio id="bg-music" autoplay loop playsinline>
  <source src="trustme.mp3" type="audio/mpeg">
</audio>

<div class="background-layer"></div>

<div id="loading-screen">
  <div class="loading-text">loading...</div>
</div>

<div id="site">

<div class="hero">
  <h1>overexposed</h1>
  <div class="volume-note">turn your volume up.</div>
</div>

<div class="files-container">
  <div class="file" id="music-file">music</div>
  <div class="file" id="definition-file">definition</div>
  <div class="file" id="feelings-file">my feelings</div>
  <div class="file" id="games-file">games</div>
</div>

<div class="section" id="definition-section">
  overexposed means too much light, too much attention, too much visibility.
  <span style="color:#fff;">4/10</span>
</div>

<div class="section" id="feelings-section">
  (your full paragraph text here)
</div>

<div class="section" id="games-section">
  <div class="game" onclick="window.open('https://example.com/car-game','_blank')">
    car game
  </div>
  <div class="game" onclick="window.open('https://example.com/memory-game','_blank')">
    memory game
  </div>
  <div class="game" onclick="window.open('https://example.com','_blank')">
    memory glitch
  </div>
  <div class="game" onclick="window.open('https://example.com','_blank')">
    reaction test
  </div>
</div>

<footer>
  © 2026 aussie
</footer>

</div>

<script>

const bgMusic = document.getElementById("bg-music");
bgMusic.volume = 0;
bgMusic.muted = true;

/* fade in music on first interaction */
function startMusic(){
  bgMusic.muted = false;
  let fade = setInterval(()=>{
    if(bgMusic.volume < 0.5){
      bgMusic.volume += 0.05;
    } else {
      clearInterval(fade);
    }
  },200);
}

document.addEventListener("click", startMusic, { once:true });

window.addEventListener("load",()=>{
  bgMusic.play().catch(()=>{});
  setTimeout(()=>{
    document.getElementById("loading-screen").style.display="none";
    document.getElementById("site").style.display="block";
    scatter();
  },2500);
});

/* random scatter with depth */
function scatter(){
  const container=document.querySelector(".files-container");
  const files=document.querySelectorAll(".file");
  const cw=container.offsetWidth;
  const ch=container.offsetHeight;

  files.forEach(file=>{
    const depth = Math.random()*100;
    file.style.left=Math.random()*(cw-file.offsetWidth)+"px";
    file.style.top=Math.random()*(ch-file.offsetHeight)+"px";
    file.style.transform=`translateZ(${depth}px)`;
    file.dataset.depth = depth;
  });
}

/* dragging */
document.querySelectorAll(".file").forEach(file=>{
  let offsetX, offsetY, isDragging=false;

  file.addEventListener("pointerdown",(e)=>{
    isDragging=true;
    offsetX=e.clientX-file.offsetLeft;
    offsetY=e.clientY-file.offsetTop;
    file.setPointerCapture(e.pointerId);
    file.style.transition="none";
  });

  file.addEventListener("pointermove",(e)=>{
    if(!isDragging) return;
    file.style.left=(e.clientX-offsetX)+"px";
    file.style.top=(e.clientY-offsetY)+"px";
  });

  file.addEventListener("pointerup",()=>{
    isDragging=false;
    file.style.transition="transform 0.2s ease";
  });
});

/* toggles */
document.addEventListener("click",function(e){
  if(!e.target.classList.contains("file")) return;

  if(e.target.id==="music-file"){
    window.open("https://linktr.ee/vegemiteloverr","_blank");
  }

  if(e.target.id==="definition-file"){
    toggle("definition-section");
  }

  if(e.target.id==="feelings-file"){
    toggle("feelings-section");
  }

  if(e.target.id==="games-file"){
    toggle("games-section");
  }
});

function toggle(id){
  const section=document.getElementById(id);
  section.style.display =
    section.style.display==="block"?"none":"block";
}

/* parallax depth on scroll */
window.addEventListener("scroll",()=>{
  const sc = window.scrollY;
  document.querySelector(".hero").style.transform =
    `translateZ(${40 + sc*0.03}px)`;
});

</script>

</body>
</html>
