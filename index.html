<script>

/* RANDOM SCATTER */
function scatterFolders(){
  const container=document.querySelector(".files-container");
  const files=document.querySelectorAll(".file");

  const containerWidth=container.offsetWidth;
  const containerHeight=container.offsetHeight;

  files.forEach(file=>{
    const maxX=containerWidth-file.offsetWidth;
    const maxY=containerHeight-file.offsetHeight;

    file.style.left=Math.random()*maxX+"px";
    file.style.top=Math.random()*maxY+"px";
  });
}

window.onload=scatterFolders;


/* DRAG + CLICK DETECTION (mobile safe) */
document.querySelectorAll('.file').forEach(file=>{
  let offsetX,offsetY,dragging=false,moved=false;

  function start(x,y){
    const rect=file.getBoundingClientRect();
    offsetX=x-rect.left;
    offsetY=y-rect.top;
    dragging=true;
    moved=false;
    file.style.zIndex=999;
  }

  function move(x,y){
    if(!dragging) return;
    moved=true;
    file.style.left=(x-offsetX)+"px";
    file.style.top=(y-offsetY)+"px";
  }

  function end(){
    dragging=false;
  }

  file.addEventListener("mousedown",e=>start(e.clientX,e.clientY));
  document.addEventListener("mousemove",e=>move(e.clientX,e.clientY));
  document.addEventListener("mouseup",end);

  file.addEventListener("touchstart",e=>{
    const t=e.touches[0];
    start(t.clientX,t.clientY);
  });

  document.addEventListener("touchmove",e=>{
    const t=e.touches[0];
    move(t.clientX,t.clientY);
  });

  document.addEventListener("touchend",end);

  /* CLICK ACTION ONLY IF NOT DRAGGED */
  file.addEventListener("click",()=>{
    if(moved) return;

    if(file.id==="music-file"){
      window.open("https://linktr.ee/vegemiteloverr","_blank");
    }

    if(file.id==="memory-file"){
      toggleSection("memory-section");
    }

    if(file.id==="car-file"){
      toggleSection("car-section");
    }
  });

});


/* TOGGLE SECTIONS */
function toggleSection(id){
  const section=document.getElementById(id);
  const memory=document.getElementById("memory-section");
  const car=document.getElementById("car-section");

  /* close other section if switching */
  if(id==="memory-section" && car.style.display==="block"){
    car.style.display="none";
  }

  if(id==="car-section" && memory.style.display==="block"){
    memory.style.display="none";
  }

  /* toggle selected */
  if(section.style.display==="block"){
    section.style.display="none";
  } else {
    section.style.display="block";
    section.scrollIntoView({behavior:"smooth"});
  }
}


/* MEMORY GAME */
const squares=document.querySelectorAll('.memory-square');
let sequence=[],player=[],level=1;
const msg=document.getElementById("memory-message");

function flash(){
  player=[];
  msg.textContent="level "+level;
  let i=0;
  const int=setInterval(()=>{
    squares.forEach(s=>s.classList.remove("active"));
    if(i<sequence.length){
      squares[sequence[i]].classList.add("active");
      i++;
    } else {
      clearInterval(int);
      msg.textContent="your turn";
    }
  },500);
}

function next(){
  sequence.push(Math.floor(Math.random()*9));
  flash();
  level++;
}

squares.forEach((sq,i)=>{
  sq.addEventListener("click",()=>handle(i));
  sq.addEventListener("touchstart",()=>handle(i));
});

function handle(i){
  player.push(i);
  if(player[player.length-1]!==sequence[player.length-1]){
    msg.textContent="wrong";
    sequence=[];level=1;
    setTimeout(next,1000);
    return;
  }
  if(player.length===sequence.length){
    setTimeout(next,800);
  }
}
next();


/* CAR GAME (mobile controls) */
const canvas=document.getElementById("carCanvas");
const ctx=canvas.getContext("2d");
let carX=130,obstacles=[],score=0;
let left=false,right=false;

document.getElementById("leftBtn").addEventListener("touchstart",()=>left=true);
document.getElementById("leftBtn").addEventListener("touchend",()=>left=false);
document.getElementById("rightBtn").addEventListener("touchstart",()=>right=true);
document.getElementById("rightBtn").addEventListener("touchend",()=>right=false);

function loop(){
  ctx.clearRect(0,0,300,400);

  if(left && carX>0) carX-=5;
  if(right && carX<260) carX+=5;

  ctx.fillStyle="#000";
  ctx.fillRect(carX,350,40,40);

  if(Math.random()<0.02){
    obstacles.push({x:Math.random()*260,y:0});
  }

  obstacles.forEach(o=>{
    o.y+=4;
    ctx.fillRect(o.x,o.y,40,20);
  });

  obstacles=obstacles.filter(o=>o.y<400);

  ctx.fillText("score "+score,10,20);
  score++;
  requestAnimationFrame(loop);
}
loop();

</script>
