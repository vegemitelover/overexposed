<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Overexposed</title>
<link rel="icon" href="favicon.png" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=Chivo:wght@700;900&display=swap" rel="stylesheet">
<style>
/* Reset & Base */
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'Chivo', sans-serif; background:#fff; color:#000; text-align:center; overflow-x:hidden; user-select:none; -webkit-font-smoothing: none; }

/* Pixelated Text Effect */
h1, h2, p, .file { 
  text-shadow:
    1px 0 #000,
    0 1px #000,
    1px 1px #000;
  -webkit-font-smoothing: none;
}

/* Hero Section */
.hero {
  padding: 80px 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.hero img {
  width: 220px;
  max-width: 50%;
  border-radius: 8px;
  box-shadow: 0 0 20px rgba(0,0,0,0.2);
  transition: transform 0.3s;
}
.hero img:hover { transform: scale(1.05); }
.hero h1 {
  margin: 30px 0 10px;
  font-size: 3.5em;
  font-weight: 900;
  letter-spacing: 2px;
}
.hero p { font-size:1.2em; font-weight:700; opacity:0.8; max-width:400px; }

/* Pixelated Black Folders */
.files-container {
  position: relative;
  width: 100%;
  height: 600px;
  margin-top: 50px;
}
.file {
  width: 140px;
  padding: 15px;
  background: #000;
  border: 2px solid #000;
  border-radius: 2px;
  position: absolute;
  cursor: grab;
  font-weight: 700;
  color: #fff;
  font-size: 0.95em;
  text-align: center;
  box-shadow: 2px 2px 0 #000;
  transition: transform 0.2s, box-shadow 0.2s;
}
.file:active {
  cursor: grabbing;
  transform: scale(1.05);
  z-index: 999;
}
.linktree-file a { color:#fff; text-decoration:none; }
.linktree-file a:hover { opacity:0.7; }

/* Section Titles */
h2 { margin-bottom: 15px; font-size:2em; font-weight:900; }

/* Memory Game */
.memory-game {
  margin: 60px auto;
  max-width: 400px;
  padding: 25px;
  border: 1px solid #000;
  border-radius: 12px;
  background: #fff;
}
.memory-grid { display: grid; grid-template-columns: repeat(3, 90px); grid-gap:12px; justify-content:center; }
.memory-square { width:90px; height:90px; background:#eee; border:1px solid #000; cursor:pointer; transition: all 0.2s; }
.memory-square.active { background:#000; transform: scale(1.1); }
.warning { font-weight:700; margin-bottom:15px; opacity:0.8; }
#memory-message { margin-top:15px; font-weight:700; opacity:0.8; }

/* Car Game */
.car-game {
  margin: 60px auto;
  max-width: 420px;
  padding: 20px;
  border: 1px solid #000;
  border-radius: 12px;
  background: #fff;
}
canvas { display:block; margin:0 auto; background:#eee; border:1px solid #000; }

/* Footer */
footer { margin:60px 0 20px; font-size:0.85em; color:#444; opacity:0.7; }

</style>
</head>
<body>

<div class="hero">
  <img src="cover.jpg" alt="Overexposed EP Cover">
  <h1>OVEREXPOSED</h1>
  <p>Experience it. Catch the moments.</p>
</div>

<!-- Movable Files -->
<div class="files-container">
  <div class="file" style="top:50px; left:50px;" id="linktree">
    <div class="linktree-file">
      <a href="https://linktr.ee/vegemiteloverr" target="_blank">Music</a>
    </div>
  </div>
  <div class="file" style="top:50px; left:250px;" id="memory-game-file">
    <div>Memory Game</div>
  </div>
  <div class="file" style="top:50px; left:450px;" id="car-game-file">
    <div>Car Challenge</div>
  </div>
</div>

<!-- Memory Game -->
<div class="memory-game" id="memory-game-section">
  <h2>Strobe Memory Game</h2>
  <p class="warning">⚠️ Flashing lights – viewer discretion advised.</p>
  <div class="memory-grid">
    <div class="memory-square"></div>
    <div class="memory-square"></div>
    <div class="memory-square"></div>
    <div class="memory-square"></div>
    <div class="memory-square"></div>
    <div class="memory-square"></div>
    <div class="memory-square"></div>
    <div class="memory-square"></div>
    <div class="memory-square"></div>
  </div>
  <p id="memory-message">Click squares in the same sequence!</p>
</div>

<!-- Car Game -->
<div class="car-game" id="car-game-section">
  <h2>8-bit Car Challenge</h2>
  <canvas id="carCanvas" width="300" height="400"></canvas>
  <p>Use arrow keys to dodge obstacles.</p>
</div>

<footer>
  &copy; 2026 snowchild. All Rights Reserved.
</footer>

<script>
/******** MOVABLE FILES ********/
const files = document.querySelectorAll('.file');
files.forEach(file => {
  let offsetX, offsetY;
  let isDragging = false;

  file.addEventListener('mousedown', e => {
    isDragging = true;
    offsetX = e.clientX - file.getBoundingClientRect().left;
    offsetY = e.clientY - file.getBoundingClientRect().top;
    file.style.zIndex = 1000; // bring to front
  });

  document.addEventListener('mousemove', e => {
    if (!isDragging) return;
    file.style.left = (e.clientX - offsetX) + 'px';
    file.style.top = (e.clientY - offsetY) + 'px';
  });

  document.addEventListener('mouseup', e => {
    if (!isDragging) return;
    isDragging = false;
    file.style.zIndex = 1; // reset z-index
  });

  // Click scroll functionality
  if(file.id === "memory-game-file") file.addEventListener('click', () => {
    document.getElementById("memory-game-section").scrollIntoView({behavior:'smooth'});
  });
  if(file.id === "car-game-file") file.addEventListener('click', () => {
    document.getElementById("car-game-section").scrollIntoView({behavior:'smooth'});
  });
});

/******** MEMORY GAME ********/
const memSquares = document.querySelectorAll('.memory-square');
const memMessage = document.getElementById('memory-message');
let sequence = [];
let playerSequence = [];
let level = 1;

function flashSequence() {
  playerSequence = [];
  memMessage.textContent = `Level ${level}: Watch the sequence`;
  let i = 0;
  const interval = setInterval(() => {
    memSquares.forEach(s => s.classList.remove('active'));
    if (i < sequence.length) { memSquares[sequence[i]].classList.add('active'); i++; } 
    else { clearInterval(interval); memMessage.textContent = `Your turn! Repeat the sequence.`; }
  }, 600);
}

function nextLevel() {
  const rand = Math.floor(Math.random() * memSquares.length);
  sequence.push(rand);
  flashSequence();
  level++;
}

memSquares.forEach((sq, idx) => {
  sq.addEventListener('click', () => {
    if(!sequence.length) return;
    playerSequence.push(idx);
    sq.classList.add('active');
    setTimeout(() => sq.classList.remove('active'), 300);
    for(let i=0;i<playerSequence.length;i++){ 
      if(playerSequence[i]!==sequence[i]){ 
        memMessage.textContent="Wrong! Restarting..."; 
        sequence=[]; level=1; 
        setTimeout(nextLevel,1000); 
        return; 
      } 
    }
    if(playerSequence.length===sequence.length){ 
      memMessage.textContent="Good! Next level."; 
      setTimeout(nextLevel,1000); 
    }
  });
});

nextLevel();

/******** CAR GAME ********/
const canvas = document.getElementById('carCanvas');
const ctx = canvas.getContext('2d');
const carWidth=30, carHeight=50;
let carX=canvas.width/2 - carWidth/2, carY=canvas.height - carHeight -10;
let obstacles=[], score=0, leftPressed=false, rightPressed=false;
document.addEventListener('keydown', e => { if(e.key==='ArrowLeft') leftPressed=true; if(e.key==='ArrowRight') rightPressed=true; });
document.addEventListener('keyup', e => { if(e.key==='ArrowLeft') leftPressed=false; if(e.key==='ArrowRight') rightPressed=false; });

function drawCar(){ ctx.fillStyle='#000'; ctx.fillRect(carX, carY, carWidth, carHeight); }
function drawObstacles(){ ctx.fillStyle='#000'; obstacles.forEach(obs => ctx.fillRect(obs.x, obs.y, obs.w, obs.h)); }
function updateObstacles(){ obstacles.forEach(obs=>obs.y+=4); obstacles=obstacles.filter(obs=>obs.y<canvas.height); if(Math.random()<0.02){const width=50+Math.random()*50; obstacles.push({x:Math.random()*(canvas.width-width),y:-50,w:width,h:20}); } }
function collision(){ for(let obs of obstacles){ if(carX<obs.x+obs.w && carX+carWidth>obs.x && carY<obs.y+obs.h && carY+carHeight>obs.y){ score=0; obstacles=[]; } } }
function moveCar(){ if(leftPressed && carX>0) carX-=5; if(rightPressed && carX+carWidth<canvas.width) carX+=5; }
function drawScore(){ ctx.fillStyle='#000'; ctx.font='16px Chivo'; ctx.fillText(`Score: ${score}`,10,20); }
function gameLoop(){ ctx.clearRect(0,0,canvas.width,canvas.height); moveCar(); updateObstacles(); collision(); drawCar(); drawObstacles(); drawScore(); score++; requestAnimationFrame(gameLoop); }
gameLoop();
</script>
</body>
</html>
